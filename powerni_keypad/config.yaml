name: PowerNI keypad+ Meter
version: "1.2.6"
slug: powerni_keypad
# Base image ships its own s6-overlay init — don't let the Supervisor inject one,
# or s6 isn't PID 1 ("s6-overlay-suexec: fatal: can only run as pid 1").
init: false
description: Read a PowerNI keypad+ prepayment meter over Bluetooth and publish balance / days / units to Home Assistant via MQTT discovery.
url: https://github.com/itconor/powerni-keypad-plus-mqtt
arch:
  - aarch64
  - armv7
  - armhf
  - amd64
startup: services
boot: auto
# In-HA pairing + status page (sidebar panel)
ingress: true
ingress_port: 8099
panel_icon: mdi:bluetooth-connect
panel_title: Meter Pairing
# Bluetooth Classic (RFCOMM):
#  - host_dbus: pairing via the host's bluetoothd
#  - host_network: THE key one — the kernel only allows AF_BLUETOOTH sockets in
#    the host network namespace (bt_sock_create returns -EAFNOSUPPORT / errno 97
#    otherwise). Without this the reader can't open the RFCOMM socket.
#  - full_access: privileged mode for raw socket access (needs Protection mode OFF).
host_dbus: true
host_network: true
full_access: true
# Auto-pick up broker credentials from the Mosquitto add-on when present
services:
  - mqtt:want
options:
  meter_mac: ""
  meter_channel: 6
  poll_seconds: 1200
  mqtt_host: ""
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_pass: ""
schema:
  # meter_mac is optional — leave blank and pick your meter with the Scan button
  # in the Meter Pairing panel. Set it here only to force a specific MAC.
  meter_mac: "str?"
  meter_channel: "int(1,30)"
  poll_seconds: "int(60,86400)"
  mqtt_host: "str?"
  mqtt_port: "port"
  mqtt_user: "str?"
  mqtt_pass: "password?"
