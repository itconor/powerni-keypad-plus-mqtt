name: PowerNI keypad+ Meter
version: "1.0.0"
slug: powerni_keypad
description: Read a PowerNI keypad+ prepayment meter over Bluetooth and publish balance / days / units to Home Assistant via MQTT discovery.
url: https://github.com/itconor/powerni-keypad-plus-mqtt
arch:
  - aarch64
  - armv7
  - armhf
  - amd64
startup: services
boot: auto
# Bluetooth Classic (RFCOMM) needs host D-Bus (BlueZ) + raw socket capabilities
host_dbus: true
privileged:
  - NET_ADMIN
  - NET_RAW
# Auto-pick up broker credentials from the Mosquitto add-on when present
services:
  - mqtt:want
options:
  meter_mac: "AA:BB:CC:DD:EE:FF"
  meter_channel: 6
  poll_seconds: 1200
  mqtt_host: ""
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_pass: ""
schema:
  meter_mac: "str"
  meter_channel: "int(1,30)"
  poll_seconds: "int(60,86400)"
  mqtt_host: "str?"
  mqtt_port: "port"
  mqtt_user: "str?"
  mqtt_pass: "password?"
